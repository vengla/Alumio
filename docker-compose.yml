version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=alumni_platform_secret_key_change_in_production_12345
      # In production, point MONGODB_URI to an actual MongoDB instance
      # - MONGODB_URI=mongodb+srv://admin:pass@cluster0...mongodb.net/alumni_db?retryWrites=true&w=majority
    restart: always

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Update NEXT_PUBLIC_API_URL to be the public URL of the backend API
      # If running locally via docker, localhost:5000 works for browser connectivity
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: always
